<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>

    <!-- Internal CSS -->
    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        h2{
            color: darkblue;
            text-align: center;
        }

        form{
            width: 350px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        label{
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: darkblue;
            color: white;
            border: none;
        }
    </style>
</head>

<!-- Inline CSS -->
<body style="background-color: lightgray;">

    <h2 style="color:red;">Register Form</h2>

    <form>

        <label>Name:</label>
        <input type="text" placeholder="Enter your Name">
        <br><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter Email">
        <br><br>

        <label>Password:</label>
        <input type="password" placeholder="Enter Password">
        <br><br>

        <label>Contact No.:</label>
        <input type="tel" placeholder="Enter Contact No.">
        <br><br>

        <label>Address:</label>
        <input type="text" placeholder="Enter Address">
        <br><br>

        <label>State:</label>
        <input type="text" placeholder="Enter State">
        <br><br>

        <label>Gender:</label><br>

        <input type="radio" name="gender" style="width:auto;"> Male
        <input type="radio" name="gender" style="width:auto;"> Female

        <br><br>

        <label>Hobbies:</label><br>

        <input type="checkbox" style="width:auto;"> Reading <br>
        <input type="checkbox" style="width:auto;"> Gaming <br>
        <input type="checkbox" style="width:auto;"> Watching Movies <br>
        <input type="checkbox" style="width:auto;"> Listening Music

        <br><br>

        <button type="submit">Register</button>

    </form>

</body>
</html>
