<!DOCTYPE html>
<html>
<head>
    <title>Flex Layout Example</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 300px;
            background-color: lightgray;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <h2>Flex Layout Example</h2>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
