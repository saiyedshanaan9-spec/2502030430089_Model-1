<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout Example</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
        }

        .box {
            background-color: skyblue;
            border: 2px solid black;
            text-align: center;
            padding: 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h2>Grid Layout Example</h2>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>

</body>
</html>
