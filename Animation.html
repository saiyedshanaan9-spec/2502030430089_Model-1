<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animation</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
        }

        svg {
            width: 300px;
            height: 300px;
        }

        /* Rocket Animation */
        #rocket {
            animation: fly 3s infinite ease-in-out;
        }

        /* Flame Animation */
        #flame {
            animation: flame 0.2s infinite alternate;
            transform-origin: center top;
        }

        @keyframes fly {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @keyframes flame {
            from {
                transform: scaleY(1);
            }
            to {
                transform: scaleY(1.4);
            }
        }
    </style>
</head>

<body>

    <svg viewBox="0 0 200 200">

        <!-- Background Circle -->
        <circle cx="100" cy="100" r="90" fill="#1e293b"/>

        <!-- Stars -->
        <circle cx="50" cy="40" r="3" fill="white"/>
        <circle cx="150" cy="60" r="3" fill="white"/>
        <circle cx="70" cy="150" r="3" fill="white"/>

        <!-- Rocket Group -->
        <g id="rocket">

            <!-- Rocket Body -->
            <path d="M100 40 L125 90 L100 75 L75 90 Z"
                  fill="#ff4d4d"/>

            <!-- Rocket Window -->
            <circle cx="100" cy="65" r="10" fill="white"/>

            <!-- Rocket Flame -->
            <path id="flame"
                  d="M100 90 L110 120 L100 110 L90 120 Z"
                  fill="orange"/>

        </g>

    </svg>

</body>
</html>
